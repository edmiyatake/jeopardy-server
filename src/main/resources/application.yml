spring:
  application:
    name: jeopardy-server

  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

jwt:
  secret: "change-me-to-a-secure-256-bit-secret-in-production"
  expiration-ms: 86400000        # 24 hours
  refresh-expiration-ms: 604800000  # 7 days

game:
  buzz-grace-window-ms: 50       # Accept buzzes within 50ms of the first
  clue-answer-timeout-ms: 5000   # 5s to answer after buzzing in
  clue-buzz-timeout-ms: 10000    # 10s buzzer window
  final-jeopardy-wager-ms: 30000 # 30s to place a wager
  final-jeopardy-answer-ms: 30000 # 30s to submit final answer

logging:
  level:
    com.jeopardy: DEBUG
    org.springframework.web.socket: INFO
